<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain-Verwaltung</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div id="headerWrapper">
      <h1>Domain-Verwaltung</h1>
      <p id="stats"></p>
      <img src="./assets/Logo-sysob-400.png" id="sysobLogo">
    </div>
  </div>
</header>

<main>
  <!-- Neuer Kunde – immer sichtbar -->
  <div id="createForm" class="karte">
    <div class="formular-zeile">
      <input type="text" id="newName" placeholder="Firmenname *" oninput="validateCreateForm()" onkeydown="if(event.key==='Enter')createCustomer()">
      <input type="text" id="newErpId" placeholder="ERP-ID * (Zahl)" inputmode="numeric" oninput="validateCreateForm()" onkeydown="if(event.key==='Enter')createCustomer()">
      <button class="btn-dunkel" id="btnSave" onclick="createCustomer()" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Kunde anlegen
      </button>
    </div>
  </div>

  <div class="layout">
    <!-- Linke Spalte: Kundenliste -->
    <aside class="listen-spalte">
      <div class="suche-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="search" placeholder="Suchen …" oninput="render()">
        <button id="clearSearch" onclick="clearSearch()" title="Suche leeren">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <nav id="customerNav" class="kunden-nav"></nav>
    </aside>

    <!-- Rechte Spalte: Details des gewählten Kunden -->
    <section id="customerDetail"></section>
  </div>
</main>

<script src="api.js"></script>
<script src="script.js"></script>
</body>
</html>
